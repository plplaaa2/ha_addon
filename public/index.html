<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korea Radio Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="player">
            <h1>🎙️ Korea Radio v2.1.0</h1>
            <div class="radio-list">
                <button class="radio-btn" data-key="ytn"><span class="station">YTN FM</span></button>
                <button class="radio-btn" data-key="tbsfm"><span class="station">TBS FM</span></button>
                <button class="radio-btn" data-key="tbnfm"><span class="station">TBN FM</span></button>
                <button class="radio-btn" data-key="ifm"><span class="station">iFM</span></button>
                <button class="radio-btn" data-key="ebsfm"><span class="station">EBS FM</span></button>
                <button class="radio-btn" data-key="kfn"><span class="station">KFN</span></button>
                <button class="radio-btn" data-key="obs"><span class="station">OBS</span></button>
                <button class="radio-btn" data-key="cbs_fm"><span class="station">CBS FM</span></button>
                <button class="radio-btn" data-key="cbs_music"><span class="station">CBS Music</span></button>
                <button class="radio-btn" data-key="wbs"><span class="station">WBS</span></button>
                <button class="radio-btn" data-key="kbs_1radio"><span class="station">KBS 1FM</span></button>
                <button class="radio-btn" data-key="kbs_3radio"><span class="station">KBS 3FM</span></button>
                <button class="radio-btn" data-key="kbs_classic"><span class="station">KBS Classic</span></button>
                <button class="radio-btn" data-key="kbs_cool"><span class="station">KBS Cool FM</span></button>
                <button class="radio-btn" data-key="kbs_happy"><span class="station">KBS Happy FM</span></button>
                <button class="radio-btn" data-key="mbc_fm"><span class="station">MBC FM</span></button>
                <button class="radio-btn" data-key="mbc_fm4u"><span class="station">MBC FM4U</span></button>
                <button class="radio-btn" data-key="sbs_power"><span class="station">SBS PowerFM</span></button>
                <button class="radio-btn" data-key="sbs_love"><span class="station">SBS LoveFM</span></button>
            </div>
            <div class="player-controls">
                <button id="playBtn" class="control-btn play"><span>▶️ Play</span></button>
                <button id="stopBtn" class="control-btn stop"><span>⏹️ Stop</span></button>
            </div>
            <div class="now-playing">
                <p>현재 방송국: <span id="currentStation">선택 안됨</span></p>
                <p>상태: <span id="status">대기중</span></p>
            </div>
            <div class="bitrate-selector">
                <label for="bitrate">음질:</label>
                <select id="bitrate">
                    <option value="0">256kbps</option>
                    <option value="1">192kbps</option>
                    <option value="2" selected>128kbps (기본)</option>
                    <option value="3">96kbps</option>
                    <option value="4">48kbps</option>
                </select>
            </div>
            <audio id="radioPlayer" controls></audio>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
